[package]
name = "peanutbutter"
version = "0.1.4"
edition = "2024"
default-run = "pb"

[[bin]]
name = "pb"
path = "src/main.rs"

[dependencies]
ansi-to-tui = "8.0"
crossterm = "0.28"
libc = "0.2"
nucleo-matcher = "0.3"
ratatui = "0.30"
serde = { version = "1", features = ["derive"] }
termimad = "0.34"
toml = "0.8"
