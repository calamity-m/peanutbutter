# Example peanutbutter config.
#
# Copy this to:
#   ~/.config/peanutbutter/config.toml
#
# Or point peanutbutter at it directly:
#   PB_CONFIG_FILE=/path/to/config.toml peanutbutter execute

[paths]
# Additional snippet roots.
# These are added alongside:
# - the XDG default: ~/.config/peanutbutter/snippets/
# - anything in PEANUTBUTTER_PATH
snippets = [
  "/home/me/work-snippets",
  "/home/me/personal-snippets",
]

# Optional override for the frecency state file.
state_file = "/home/me/.local/state/peanutbutter/state.tsv"

[ui]
# Maximum inline TUI height.
# The terminal may still clamp this lower depending on available rows.
height = 18

[suggestion_commands]
# Maximum time (ms) a suggestion command may run before being killed.
# The variable falls back to manual input on timeout.
timeout_ms = 2000

# Set to false to disable all suggestion command execution globally.
allow_commands = true

[search]
# Search weights can also be tuned interactively with `pb settings`.
# How much frecency influences the final ranking relative to fuzzy score.
# Higher values make your usage history matter more.
# Lower values make text matching dominate.
frecency_weight = 250.0

[search.frecency]
# Recency decay half-life in days.
# Lower values make recent usage fade faster.
# Higher values preserve older usage for longer.
half_life_days = 14.0

# Multiplier for cwd/path affinity.
# Higher values make "used in this repo/directory before" matter more.
location_weight = 1.0

# Multiplier for repeated-use bonus.
# Higher values make heavily-used snippets bubble up more aggressively,
# even if they are not especially local to the current cwd.
frequency_weight = 1.0

[search.fuzzy]
# Field weights for fuzzy matching.
# These let you tune what kind of snippet metadata should dominate search.

# Snippet heading text (the `## My Snippet` title).
name = 30

# Frontmatter tags.
tag = 20

# Frontmatter `name`.
frontmatter_name = 15

# Snippet description/frontmatter description text.
description = 10

# Relative file path.
path = 10

# Executable snippet command block.
command = 8

[theme]
# Select a base theme by name: one of the 5 built-ins
#   default, gruvbox, catppuccin, nord, monochrome
# or the name of a palette registered under [theme.custom.<name>] below.
# A CLI flag like `peanutbutter execute --theme nord` overrides this name and
# skips the per-color overrides below.
name = "default"

# Colors accept common names like:
#   red, blue, white, dark_gray
# Or #RRGGBB hex values.

# Accent used for the selected marker.
accent = "red"

# Muted chrome/help text color.
muted = "dark_gray"

# Selected row background.
selected_bg = "#30343f"

# Selected row foreground.
selected_fg = "white"

# Active variable text in the prompt preview.
prompt_active_fg = "black"
prompt_active_bg = "#f4d35e"

# Error foreground.
error_fg = "red"

# You can register any number of complete custom palettes under
# [theme.custom.<name>], each providing every required base color. Set
# `name = "<name>"` above to select one; they also show up in `pb settings`'
# theme picker alongside the 5 built-ins.
# [theme.custom.onedark]
# accent = "#c678dd"
# muted = "#5c6370"
# selected_bg = "#3e4451"
# selected_fg = "#abb2bf"
# prompt_fg = "#282c34"
# prompt_bg = "#61afef"
# error_fg = "#e06c75"

# Customizable keybinds for the `pb execute` TUI.
#
# Each action takes an array of key chords. Omitted actions keep their
# defaults, an empty array (`edit = []`) unbinds the action, and invalid
# entries are reported as a status warning inside the TUI without breaking
# the rest of the config.
#
# Key chord grammar: optional `ctrl+` / `alt+` / `shift+` modifiers followed
# by a base key — a printable character or one of: enter, esc, backspace,
# tab, backtab, up, down, left, right, pageup, pagedown, home, end, insert,
# delete, f1..f12. `shift+tab` and `backtab` are the same chord. Chords like
# alt+enter or shift+tab are best-effort: some terminals do not deliver them
# as distinct key events.
#
# `ctrl+c` is reserved as an unconditional emergency cancel and cannot be
# bound. If the same chord is bound to two actions in one context, the
# earlier action (in the order shown below) keeps it and the duplicate is
# ignored with a warning. The same chord may be reused across contexts.
#
# The tables below list every action with its default binding.
#
# [keybinds.execute.select]      # handled before fuzzy/browse/tags dispatch
# cancel_or_back = ["esc"]       # cancel, or back out of browse/tag drill
# cycle_mode = ["ctrl+t", "f2"]  # fuzzy -> browse -> tags -> fuzzy
# edit = ["ctrl+e"]              # open the selected snippet in $EDITOR
# preview_down = ["ctrl+j", "ctrl+down"]
# preview_up = ["ctrl+k", "ctrl+up"]
#
# [keybinds.execute.fuzzy]
# accept = ["enter"]
# backspace = ["backspace"]
# cursor_left = ["left"]
# cursor_right = ["right"]
# move_up = ["up"]
# move_down = ["down"]
# page_up = ["pageup"]
# page_down = ["pagedown"]
#
# [keybinds.execute.browse]
# accept_or_open = ["enter"]     # open directory or accept snippet
# backspace = ["backspace"]
# complete = ["tab"]             # complete the browse filter/path
# move_up = ["up"]
# move_down = ["down"]
# page_up = ["pageup"]
# page_down = ["pagedown"]
#
# [keybinds.execute.tags]
# accept_or_drill = ["enter"]    # drill into a tag or accept a snippet
# backspace = ["backspace"]
# cursor_left = ["left"]
# cursor_right = ["right"]
# move_up = ["up"]
# move_down = ["down"]
# page_up = ["pageup"]
# page_down = ["pagedown"]
# return_to_tags = ["esc"]       # leave tag drill
#
# [keybinds.execute.prompt]
# return_to_picker = ["esc"]
# backspace_or_previous = ["backspace"]
# literal_newline = ["alt+enter", "ctrl+j"]
# suggestion_up = ["up"]
# suggestion_down = ["down"]
# complete_or_next = ["tab"]
# previous_variable = ["shift+tab", "backtab"]
# accept = ["enter"]

# Reusable predefined variable inputs.
#
# These apply to free-form placeholders like:
#   <@http_method>
#   <@kube_context>
#
# They do not override placeholders with explicit inline sources like:
#   <@method:echo GET>
#   <@target:?world>

[variables.http_method]
# Optional default value pre-filled into the prompt.
default = "GET"

# Static suggestion list shown to the user.
suggestions = ["GET", "POST", "PUT", "PATCH", "DELETE"]

[variables.file]
# Current working directory files.
command = "find . -maxdepth 1 -type f | sed 's#^./##' | sort"

[variables.files]
# Alias for `file` if you prefer plural naming in snippets.
command = "find . -maxdepth 1 -type f | sed 's#^./##' | sort"

[variables.directory]
# Current working directory directories.
command = "find . -maxdepth 1 -type d ! -path . | sed 's#^./##' | sort"

[variables.directories]
# Alias for `directory` if you prefer plural naming in snippets.
command = "find . -maxdepth 1 -type d ! -path . | sed 's#^./##' | sort"

[variables.git_branch]
command = "git branch --format='%(refname:short)'"

[variables.git_remote]
command = "git remote"

[variables.container]
command = "docker ps --format '{{.Names}}'"

[variables.image]
command = "docker images --format '{{.Repository}}:{{.Tag}}'"

[variables.kube_context]
# Dynamic suggestions from a shell command.
# The command runs in the user's current working directory.
command = "kubectl config get-contexts -o name"

[variables.namespace]
default = "default"
suggestions = ["default", "kube-system", "staging", "prod"]
