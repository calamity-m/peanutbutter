name: Unstable

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: peanutbutter
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test

  release:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Test Windows target
        if: runner.os == 'Windows'
        run: cargo test --target ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Unix release artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/${{ env.BINARY_NAME }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" "${{ env.BINARY_NAME }}"
      - name: Package Windows release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" -DestinationPath "dist/${{ env.BINARY_NAME }}-${{ matrix.target }}.zip"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish_unstable:
    permissions:
      contents: write
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Update unstable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unstable
          name: "Unstable (main)"
          prerelease: true
          make_latest: false
          files: dist/*
          body: |
            Automated build from `main` at ${{ github.sha }}.

            This is a rolling pre-release — artifacts are overwritten on every push to main.
            For stable releases, see the [releases page](../../releases) for versioned tags.
